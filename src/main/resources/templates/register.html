<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - Student Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: white;
            color: #ff4b7d;
            font-weight: bold;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #f1f1f1;
        }

        a {
            color: yellow;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="glass-card text-center">
    <h2 class="mb-4">Create Account</h2>

    <input type="text" id="registerUsername" class="form-control mb-3" placeholder="Username">
    <input type="password" id="registerPassword" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-custom w-100" onclick="registerUser()">Register</button>

    <p class="mt-3">Already have account? <a href="login.html">Login</a></p>
</div>

<script>
    async function registerUser() {
        const username = document.getElementById("registerUsername").value.trim();
        const password = document.getElementById("registerPassword").value.trim();

        if (!username) {
            alert("Username cannot be empty");
            return;
        }

        if (!password) {
            alert("Password cannot be empty");
            return;
        }

        if (username.length < 3) {
            alert("Username must be at least 3 characters");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters");
            return;
        }

        try {
            const response = await fetch("http://localhost:8080/users/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const result = await response.text();
            alert(result);

            if (result === "Registration Successful") {
                window.location.href = "login.html";
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Something went wrong!");
        }
    }
</script>

</body>
</html>
