<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Student Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: white;
            color: #764ba2;
            font-weight: bold;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #f1f1f1;
        }

        a {
            color: #ffd369;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="glass-card text-center">
    <h2 class="mb-4">Student Notes</h2>

    <input type="text" id="loginUsername" class="form-control mb-3" placeholder="Username">

    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-custom w-100" onclick="loginUser()">Login</button>

    <p class="mt-3">New here? <a href="register.html">Register</a></p>
</div>

<script>
    async function loginUser() {
        const username = document.getElementById("loginUsername").value;
        const password = document.getElementById("loginPassword").value;

        const response = await fetch("http://localhost:8080/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ username, password })
        });

        const result = await response.text();

        if (result === "Login Success") {
            window.location.href = "index.html";
        } else {
            alert("Invalid Credentials");
        }
    }
</script>

</body>
</html>
